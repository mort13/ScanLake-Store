name = "scanlake-store"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[vars]
ALLOWED_ORIGIN = "*"

[[r2_buckets]]
binding = "SCANLAKE_BUCKET"
bucket_name = "scanlake-data"

[durable_objects]
bindings = [
  { name = "RATE_LIMITER", class_name = "RateLimiter" }
]

# KV namespace for API key metadata.
# Create with: wrangler kv namespace create API_KEYS
# Then replace the placeholder IDs below with the real ones.
[[kv_namespaces]]
binding = "API_KEYS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_NAMESPACE_ID"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimiter"]
